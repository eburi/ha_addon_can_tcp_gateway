<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <defs>
    <linearGradient id="canGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrowGradR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34a853;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrowGradL" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34a853;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="200" rx="16" fill="#f8f9fa" stroke="#dadce0" stroke-width="1"/>

  <!-- CAN Bus block -->
  <rect x="40" y="50" width="150" height="100" rx="12" fill="url(#canGrad)" filter="url(#shadow)"/>
  <!-- CAN bus icon: two horizontal wires with differential signal -->
  <line x1="60" y1="85" x2="90" y2="85" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="90,85 98,78 106,92 114,78 122,92 130,85" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="130" y1="85" x2="170" y2="85" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <line x1="60" y1="115" x2="90" y2="115" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <polyline points="90,115 98,122 106,108 114,122 122,108 130,115" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <line x1="130" y1="115" x2="170" y2="115" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <text x="115" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#fff">CAN</text>

  <!-- TCP block -->
  <rect x="450" y="50" width="150" height="100" rx="12" fill="url(#tcpGrad)" filter="url(#shadow)"/>
  <!-- TCP icon: network/ethernet symbol -->
  <circle cx="525" cy="82" r="6" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="500" cy="102" r="6" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="550" cy="102" r="6" fill="none" stroke="#fff" stroke-width="2"/>
  <line x1="525" y1="88" x2="505" y2="97" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="525" y1="88" x2="545" y2="97" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="506" y1="102" x2="544" y2="102" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,3"/>

  <text x="525" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#fff">TCP</text>

  <!-- Full-duplex arrows -->
  <!-- Top arrow: CAN -> TCP -->
  <line x1="210" y1="82" x2="420" y2="82" stroke="url(#arrowGradR)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="430,82 418,75 418,89" fill="#34a853"/>

  <!-- Bottom arrow: TCP -> CAN -->
  <line x1="430" y1="118" x2="220" y2="118" stroke="url(#arrowGradL)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="210,118 222,111 222,125" fill="#1a73e8"/>

  <!-- Data bits decoration on top arrow -->
  <rect x="260" y="76" width="16" height="4" rx="1" fill="#1a73e8" opacity="0.5"/>
  <rect x="282" y="76" width="8" height="4" rx="1" fill="#1a73e8" opacity="0.4"/>
  <rect x="296" y="76" width="20" height="4" rx="1" fill="#34a853" opacity="0.4"/>
  <rect x="322" y="76" width="12" height="4" rx="1" fill="#34a853" opacity="0.5"/>
  <rect x="350" y="76" width="16" height="4" rx="1" fill="#34a853" opacity="0.5"/>
  <rect x="372" y="76" width="8" height="4" rx="1" fill="#34a853" opacity="0.6"/>

  <!-- Data bits decoration on bottom arrow -->
  <rect x="370" y="120" width="16" height="4" rx="1" fill="#34a853" opacity="0.5"/>
  <rect x="350" y="120" width="8" height="4" rx="1" fill="#34a853" opacity="0.4"/>
  <rect x="330" y="120" width="20" height="4" rx="1" fill="#1a73e8" opacity="0.4"/>
  <rect x="302" y="120" width="12" height="4" rx="1" fill="#1a73e8" opacity="0.5"/>
  <rect x="270" y="120" width="16" height="4" rx="1" fill="#1a73e8" opacity="0.5"/>
  <rect x="250" y="120" width="8" height="4" rx="1" fill="#1a73e8" opacity="0.6"/>

  <!-- Labels on arrows -->
  <text x="320" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555" font-weight="500">R  CAN frames</text>
  <text x="320" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555" font-weight="500">T  TCP writes</text>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5f6368" font-weight="600" letter-spacing="0.5">FULL-DUPLEX GATEWAY</text>

  <!-- Port label -->
  <text x="320" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#80868b">Yacht Devices RAW Protocol  :2598</text>
</svg>
